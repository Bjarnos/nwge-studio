# Warning: the retention period is only 90 days!
name: Build

on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LUALSE_VERSION: 3.17.1

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux
            runner: ubuntu-24.04
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Detect CPU count
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            echo "CPU_COUNT=$(nproc)" >> "$GITHUB_ENV"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            echo "CPU_COUNT=$(sysctl -n hw.ncpu)" >> "$GITHUB_ENV"
          else
            echo "CPU_COUNT=$NUMBER_OF_PROCESSORS" >> "$GITHUB_ENV"
          fi

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Build NWGE Studio
        env:
          CARGO_BUILD_JOBS: ${{ env.CPU_COUNT }}
        run: pnpm tauri build -- --jobs "${{ env.CPU_COUNT }}"

      - uses: actions/upload-artifact@v6
        if: runner.os == 'Linux'
        with:
          name: nwge-studio-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'Linux'
        with:
          name: nwge-studio-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'Linux'
        with:
          name: nwge-studio-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'macOS'
        with:
          name: nwge-studio-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'macOS'
        with:
          name: nwge-studio-macos-app
          path: src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'Windows'
        with:
          name: nwge-studio-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - uses: actions/upload-artifact@v6
        if: runner.os == 'Windows'
        with:
          name: nwge-studio-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
